services:
  db:
    ports:
      - "${DB_HOST_PORT:-5433}:5432"

  web-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    profiles: ["dev"]
    working_dir: /app
    command: >
      sh -c "npx prisma generate &&
      npx prisma migrate deploy &&
      npm run dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL_CONTAINER:-postgresql://postgres:postgres@db:5432/gin_der?schema=public}
      PRISMA_HIDE_UPDATE_MESSAGE: "1"
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_HOST_PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
